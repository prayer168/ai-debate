<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>傅科摆 — Foucault Pendulum</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0704;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Georgia, 'Times New Roman', serif;
    }
    .wrapper {
      display: flex;
      align-items: stretch;
      gap: 18px;
    }
    canvas {
      display: block;
      flex-shrink: 0;
      box-shadow: 0 0 60px rgba(0,0,0,0.92), 0 0 20px rgba(100,60,10,0.12);
    }

    /* ── Sidebar shell ── */
    .sidebar {
      display: flex;
      flex-direction: column;
      width: 148px;
      padding: 0;
      gap: 0;
      border: 1px solid #2e1c0a;
      background: linear-gradient(180deg, #100c06 0%, #0c0906 100%);
      box-shadow: inset 0 0 18px rgba(0,0,0,0.6);
    }

    /* ── Section block ── */
    .sb-section {
      padding: 11px 12px;
      border-bottom: 1px solid #251408;
    }
    .sb-section:last-child { border-bottom: none; }

    /* ornament divider */
    .ornament {
      text-align: center;
      color: #3e2410;
      font-size: 9px;
      letter-spacing: 3px;
      margin: 2px 0 8px;
      user-select: none;
    }

    /* ── Title ── */
    .title-main {
      color: #c8a852;
      font-size: 10.5px;
      letter-spacing: 3px;
      text-transform: uppercase;
      line-height: 1.55;
    }
    .title-sub {
      color: #6a4a1e;
      font-size: 8.5px;
      letter-spacing: 2px;
      margin-top: 3px;
    }

    /* ── Description text ── */
    .desc {
      color: #7a5a2a;
      font-size: 8.5px;
      line-height: 1.75;
      letter-spacing: 0.4px;
    }
    .desc em {
      color: #a07838;
      font-style: italic;
    }

    /* ── Section label ── */
    .sb-label {
      color: #7a5828;
      font-size: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    /* ── City buttons ── */
    .city-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .city-btn {
      background: none;
      border: 1px solid #2c1808;
      color: #8a6830;
      font-family: Georgia, serif;
      font-size: 10.5px;
      padding: 4px 8px;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      letter-spacing: 0.5px;
    }
    .city-btn:hover {
      border-color: #7a4818;
      color: #c8903a;
      background: rgba(70,35,8,0.22);
    }
    .city-btn.active {
      border-color: #a06820;
      color: #dca848;
      background: rgba(70,35,8,0.32);
    }
    .city-btn .lat-badge {
      float: right;
      font-size: 8px;
      color: #4e3010;
      margin-top: 1px;
    }
    .city-btn.active .lat-badge { color: #8a6020; }

    /* ── Stats row ── */
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .stat-key {
      color: #5a3a14;
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .stat-val {
      color: #b08030;
      font-size: 10px;
      letter-spacing: 1px;
    }

    /* ── Controls ── */
    .ctrl-row {
      display: flex;
      gap: 6px;
      margin-bottom: 9px;
    }
    .ctrl-btn {
      flex: 1;
      background: none;
      border: 1px solid #3a2010;
      color: #8a6030;
      font-family: Georgia, serif;
      font-size: 13px;
      padding: 5px 0;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }
    .ctrl-btn:hover  { border-color: #8a5020; color: #c8802a; background: rgba(70,30,5,0.20); }
    .ctrl-btn:active { background: rgba(70,30,5,0.40); }
    .ctrl-btn.paused { color: #d4a040; border-color: #9a7020; }

    /* ── Speed slider ── */
    .speed-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .speed-label {
      color: #5a3a14;
      font-size: 8px;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 2px;
      background: #2e1808;
      outline: none;
      border-radius: 1px;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #a07030;
      cursor: pointer;
      border: 1px solid #6a4010;
      transition: background 0.15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { background: #c89040; }
    .speed-val {
      color: #8a6030;
      font-size: 8.5px;
      width: 22px;
      text-align: right;
    }

    /* ── Reset button ── */
    .reset-btn {
      width: 100%;
      background: none;
      border: 1px solid #3a2010;
      color: #7a5028;
      font-family: Georgia, serif;
      font-size: 9px;
      letter-spacing: 3px;
      padding: 6px 0;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .reset-btn:hover  { border-color: #9a5818; color: #c87030; background: rgba(70,25,5,0.20); }
    .reset-btn:active { background: rgba(70,25,5,0.40); }
  </style>
</head>
<body>
<div class="wrapper">
  <canvas id="c"></canvas>

  <div class="sidebar">

    <!-- Title -->
    <div class="sb-section">
      <div class="title-main">Pendule de<br>Foucault</div>
      <div class="title-sub">傅科摆 · Foucault Pendulum</div>
    </div>

    <!-- Description -->
    <div class="sb-section">
      <div class="ornament">· · ·</div>
      <div class="desc">
        1851年巴黎先賢祠，傅科以<br>
        67m 鉛錘直證<em>地球自轉</em>。<br><br>
        擺面固定於慣性空間，<br>
        沙痕呈現<em>旋轉花紋</em>。<br><br>
        T = 24h / sin φ
      </div>
    </div>

    <!-- City selector -->
    <div class="sb-section" style="flex:1; overflow:hidden;">
      <div class="sb-label">城市 / Location</div>
      <div class="city-list" id="cityList"></div>
    </div>

    <!-- Stats -->
    <div class="sb-section">
      <div class="ornament">· · ·</div>
      <div class="stats-row">
        <span class="stat-key">緯度</span>
        <span class="stat-val" id="statLat">—</span>
      </div>
      <div class="stats-row">
        <span class="stat-key">進動</span>
        <span class="stat-val" id="statRpm">— rpm</span>
      </div>
      <div class="stats-row">
        <span class="stat-key">週期</span>
        <span class="stat-val" id="statPeriod">— h</span>
      </div>
    </div>

    <!-- Controls: pause + speed -->
    <div class="sb-section">
      <div class="sb-label">控制 / Controls</div>
      <div class="ctrl-row">
        <button class="ctrl-btn" id="pauseBtn" title="暫停/播放">⏸</button>
        <button class="reset-btn" id="resetBtn" style="flex:1;margin:0;font-size:9px">↺ 重置</button>
      </div>
      <div class="speed-row">
        <span class="speed-label">速度</span>
        <input type="range" id="speedSlider" min="0.25" max="4" step="0.25" value="1">
        <span class="speed-val" id="speedVal">×1</span>
      </div>
    </div>

  </div>
</div>

<script>
  // ── Cities ─────────────────────────────────────────────────
  const CITIES = [
    { name: '台南',   country: '台灣',  lat: 23.0 },
    { name: '台北',   country: '台灣',  lat: 25.0 },
    { name: '東京',   country: '日本',  lat: 35.7 },
    { name: '北京',   country: '中國',  lat: 39.9 },
    { name: '巴黎',   country: '法國',  lat: 48.9 },
    { name: '倫敦',   country: '英國',  lat: 51.5 },
    { name: '赫爾辛基', country:'芬蘭', lat: 60.2 },
    { name: '北極點', country: '',      lat: 90.0 },
  ];

  // Precession rate: real physics sin(lat) scaling,
  // anchored so 台南(23°N) = 2.0 rpm in animation
  const BASE_RPM = 2.0;
  const BASE_SIN = Math.sin(23 * Math.PI / 180);
  function cityPrecRate(lat) {
    return (BASE_RPM * Math.sin(lat * Math.PI / 180) / BASE_SIN)
           * (2 * Math.PI / 60);
  }

  let currentCity = 0;
  let currentPrecRate = cityPrecRate(CITIES[0].lat);

  // ── Canvas ─────────────────────────────────────────────────
  const c   = document.getElementById('c');
  const ctx = c.getContext('2d');
  const W = 234, H = 342;
  c.width = W; c.height = H;

  // ── Layout ─────────────────────────────────────────────────
  const PX    = W / 2;
  const PY    = 16;
  const WIRE  = 130;   // shorter pendulum
  const SEP   = 196;
  const BCX   = W / 2;
  const BCY   = 278;
  const TILT  = 0.40;
  const BR_X  = 79;
  const BR_Y  = BR_X * TILT;
  const RIM_H = 7;
  const TRAIL_R = BR_X * 0.66;

  // ── Physics ────────────────────────────────────────────────
  const T_PEND    = 4.0;
  const OMEGA     = (2 * Math.PI) / T_PEND;
  const SWING_AMP = 0.26;

  // ── Coordinate helper ──────────────────────────────────────
  function w2s(wx, wz) {
    return { x: BCX + wx, y: BCY + wz * TILT };
  }

  // ── Offscreen: static texture ──────────────────────────────
  const texC = document.createElement('canvas');
  texC.width = W; texC.height = H;
  buildTexture(texC.getContext('2d'));

  // ── Offscreen: persistent sand trail ──────────────────────
  const sandC = document.createElement('canvas');
  sandC.width = W; sandC.height = H;
  const sandX = sandC.getContext('2d');

  function resetSand() {
    sandX.clearRect(0, 0, W, H);
    drawCompassRose(sandX);
  }
  resetSand();

  // ── State ──────────────────────────────────────────────────
  let simTime = 0, lastTS = null;
  let particles = [];
  let frameN = 0;

  // ──────────────────────────────────────────────────────────
  //  MARBLE TILE FLOOR
  // ──────────────────────────────────────────────────────────
  function drawMarbleTiles(tx) {
    const floorH = H - SEP;
    const TILE   = 40;  // tile size px

    // Simplex-like smooth noise via layered sin/cos for marble veining
    function marbleNoise(x, y, seed) {
      const s = seed || 0;
      return (
        Math.sin((x * 0.045 + y * 0.018 + s) * 1.0) * 0.40 +
        Math.sin((x * 0.018 - y * 0.040 + s + 1.3) * 2.1) * 0.25 +
        Math.sin((x * 0.070 + y * 0.060 + s + 2.7) * 0.8) * 0.20 +
        Math.cos((x * 0.030 + y * 0.080 + s + 0.5) * 1.5) * 0.15
      );
    }

    // Offscreen: single marble tile (TILE × TILE)
    const tileSeeds = [];
    const cols = Math.ceil(W / TILE) + 1;
    const rows = Math.ceil(floorH / TILE) + 1;
    for (let tr = 0; tr < rows; tr++) {
      for (let tc = 0; tc < cols; tc++) {
        tileSeeds.push(Math.random() * 8);
      }
    }

    // Draw each tile
    for (let tr = 0; tr < rows; tr++) {
      for (let tc = 0; tc < cols; tc++) {
        const tx0 = tc * TILE;
        const ty0 = SEP + tr * TILE;
        const seed = tileSeeds[tr * cols + tc];

        // Base marble color: off-white / warm grey
        const baseR = 210 + (Math.random() * 18 | 0);
        const baseG = 205 + (Math.random() * 15 | 0);
        const baseB = 198 + (Math.random() * 12 | 0);

        // Fill tile pixel by pixel with marble pattern
        const tileW = Math.min(TILE, W - tx0);
        const tileH = Math.min(TILE, H - ty0);
        if (tileW <= 0 || tileH <= 0) continue;   // skip zero-size tiles
        const tileImg = tx.getImageData(tx0, ty0, tileW, tileH);
        const td = tileImg.data;
        for (let py = 0; py < tileImg.height; py++) {
          for (let px = 0; px < tileImg.width; px++) {
            const wx = tx0 + px;
            const wy = tr * TILE + py;
            const n  = marbleNoise(wx, wy, seed);
            // Vein intensity: sharp dark streaks
            const vein = Math.pow(Math.abs(Math.sin(n * Math.PI * 3.5)), 3.5);
            const r = Math.max(0, baseR - vein * 90  - (Math.random() * 4 | 0));
            const g = Math.max(0, baseG - vein * 88  - (Math.random() * 4 | 0));
            const b = Math.max(0, baseB - vein * 82  - (Math.random() * 4 | 0));
            const idx = (py * tileImg.width + px) * 4;
            td[idx]   = r;
            td[idx+1] = g;
            td[idx+2] = b;
            td[idx+3] = 255;
          }
        }
        tx.putImageData(tileImg, tx0, ty0);

        // Tile grout lines
        tx.strokeStyle = 'rgba(80,72,65,0.55)';
        tx.lineWidth   = 1;
        tx.strokeRect(tx0 + 0.5, ty0 + 0.5,
                      Math.min(TILE, W - tx0) - 1,
                      Math.min(TILE, H - ty0) - 1);

        // Subtle highlight gloss on each tile
        const gloss = tx.createLinearGradient(tx0, ty0, tx0 + TILE, ty0 + TILE);
        gloss.addColorStop(0,   'rgba(255,255,255,0.10)');
        gloss.addColorStop(0.4, 'rgba(255,255,255,0.04)');
        gloss.addColorStop(1,   'rgba(0,0,0,0.06)');
        tx.fillStyle = gloss;
        tx.fillRect(tx0, ty0,
                    Math.min(TILE, W - tx0),
                    Math.min(TILE, H - ty0));
      }
    }

    // Overall floor vignette (darker edges)
    const fvig = tx.createRadialGradient(
      W/2, SEP + floorH * 0.3, floorH * 0.05,
      W/2, SEP + floorH * 0.5, W * 0.85);
    fvig.addColorStop(0,   'rgba(0,0,0,0)');
    fvig.addColorStop(1,   'rgba(0,0,0,0.38)');
    tx.fillStyle = fvig;
    tx.fillRect(0, SEP, W, floorH);
  }

  // ──────────────────────────────────────────────────────────
  //  TEXTURE
  // ──────────────────────────────────────────────────────────
  function buildTexture(tx) {
    tx.fillStyle = '#262016';
    tx.fillRect(0, 0, W, SEP);
    const img1 = tx.getImageData(0, 0, W, SEP);
    const d1 = img1.data;
    for (let i = 0; i < d1.length; i += 4) {
      const n = (Math.random() * 26) | 0;
      d1[i]   = Math.min(255, d1[i]   + n);
      d1[i+1] = Math.min(255, d1[i+1] + ((n * 0.78) | 0));
      d1[i+2] = Math.min(255, d1[i+2] + ((n * 0.48) | 0));
      d1[i+3] = 255;
    }
    tx.putImageData(img1, 0, 0);

    const vig = tx.createRadialGradient(PX, SEP*0.42, SEP*0.08,
                                         PX, SEP*0.42, SEP*0.94);
    vig.addColorStop(0, 'rgba(0,0,0,0)');
    vig.addColorStop(1, 'rgba(0,0,0,0.55)');
    tx.fillStyle = vig;
    tx.fillRect(0, 0, W, SEP);

    // ── Marble tile floor ──────────────────────────────────
    drawMarbleTiles(tx);

    tx.fillStyle = '#100c08';
    tx.fillRect(0, SEP - 4, W, 8);
    tx.fillStyle = '#5a3412';
    tx.fillRect(0, SEP - 1, W, 2);
  }

  // ──────────────────────────────────────────────────────────
  //  COMPASS ROSE
  // ──────────────────────────────────────────────────────────
  function drawCompassRose(sx) {
    sx.save();
    const R = BR_X * 0.86;

    sx.strokeStyle = '#7a5530';
    sx.globalAlpha = 0.30;
    sx.lineWidth   = 0.7;
    [R, R * 0.60, R * 0.23].forEach(r => {
      sx.beginPath();
      sx.ellipse(BCX, BCY, r, r * TILT, 0, 0, Math.PI * 2);
      sx.stroke();
    });

    for (let i = 0; i < 16; i++) {
      const a     = (i * Math.PI) / 8;
      const inner = i % 4 === 0 ? 0 : i % 2 === 0 ? R * 0.23 : R * 0.41;
      const p0 = w2s(inner * Math.cos(a), inner * Math.sin(a));
      const p1 = w2s(R     * Math.cos(a), R     * Math.sin(a));
      sx.beginPath();
      sx.moveTo(p0.x, p0.y);
      sx.lineTo(p1.x, p1.y);
      sx.stroke();
    }

    sx.globalAlpha = 0.16;
    sx.lineWidth = 0.5;
    for (let i = 0; i < 72; i++) {
      if (i % (72 / 16) < 0.5) continue;
      const a  = (i * 2 * Math.PI) / 72;
      const ri = R * (i % 2 === 0 ? 0.90 : 0.94);
      const p0 = w2s(ri * Math.cos(a), ri * Math.sin(a));
      const p1 = w2s(R  * Math.cos(a), R  * Math.sin(a));
      sx.beginPath();
      sx.moveTo(p0.x, p0.y);
      sx.lineTo(p1.x, p1.y);
      sx.stroke();
    }

    sx.globalAlpha = 0.44;
    sx.fillStyle   = '#7a5530';
    sx.font        = `bold 8px Georgia`;
    sx.textAlign    = 'center';
    sx.textBaseline = 'middle';
    const rT = R * 0.76;
    [['N', w2s(0, -rT)], ['S', w2s(0, rT)],
     ['E', w2s(rT, 0)],  ['W', w2s(-rT, 0)]].forEach(([l, p]) => {
      sx.fillText(l, p.x, p.y);
    });

    sx.restore();
  }

  // ──────────────────────────────────────────────────────────
  //  PENDULUM MATH
  // ──────────────────────────────────────────────────────────
  function bobPos(t) {
    const swing = SWING_AMP * Math.sin(OMEGA * t);
    const prec  = currentPrecRate * t;
    return {
      x:     PX   + WIRE * Math.sin(swing) * Math.cos(prec),
      y:     PY   + WIRE * Math.cos(swing),
      vx:    WIRE * SWING_AMP * OMEGA * Math.cos(OMEGA * t) * Math.cos(prec),
      prec,
      depth: Math.sin(prec)
    };
  }

  function sandDest(t) {
    const prec = currentPrecRate * t;
    const s    = Math.sin(OMEGA * t);
    return w2s(TRAIL_R * Math.cos(prec) * s,
               TRAIL_R * Math.sin(prec) * s);
  }

  // ──────────────────────────────────────────────────────────
  //  SAND PARTICLES
  // ──────────────────────────────────────────────────────────

  // Grain colour palette: dark ochre / warm sienna
  function grainColor(alpha) {
    const base = Math.random();
    let r, g, b;
    if (base < 0.5) {
      // dark sienna
      r = (48  + (Math.random() * 28) | 0);
      g = (26  + (Math.random() * 16) | 0);
      b = (8   + (Math.random() *  8) | 0);
    } else {
      // slightly lighter ochre for variety
      r = (72  + (Math.random() * 22) | 0);
      g = (44  + (Math.random() * 16) | 0);
      b = (14  + (Math.random() * 10) | 0);
    }
    return `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
  }

  function makeParticle(bx, by, bvx, dst) {
    // Trickle angle: narrow cone downward from nozzle, slight horizontal spread
    const angle = (Math.random() - 0.5) * 0.5;  // ±0.25 rad
    const speed = Math.random() * 18 + 5;
    return {
      x:    bx + (Math.random() - 0.5) * 3,
      y:    by + 16,
      vx:   bvx * 0.12 + Math.sin(angle) * speed,
      vy:   Math.cos(angle) * speed * 0.4 + Math.random() * 8,
      r:    Math.random() * 1.0 + 0.35,
      life: 1.0,          // fades as it falls
      col:  grainColor(0.95),
      // Where the grain will stamp on the disc (Foucault coordinates)
      dstX: dst.x + (Math.random() - 0.5) * 5,
      dstY: dst.y + (Math.random() - 0.5) * 5,
      done: false,
      bounced: false
    };
  }

  // Draw a crisp pixel-rect grain (avoids arc antialiasing)
  function pixelGrain(x, y, size, col) {
    const px = x | 0;
    const py = y | 0;
    const s  = Math.max(1, size | 0);
    sandX.fillStyle = col;
    sandX.fillRect(px, py, s, s);
  }

  // Clip helper
  function clipToDisc() {
    sandX.beginPath();
    sandX.ellipse(BCX, BCY, BR_X - 8, (BR_X - 8) * TILT, 0, 0, Math.PI * 2);
    sandX.clip();
  }

  // Stamp a grain + tiny pixel scatter on landing
  function stampGrain(p) {
    sandX.save();
    clipToDisc();

    // Central grain: 1 or 2px solid pixel rect
    const sz = Math.random() < 0.5 ? 1 : 2;
    pixelGrain(p.dstX, p.dstY, sz, p.col);

    // 1-2 satellite pixels nearby
    const splats = 1 + (Math.random() * 2 | 0);
    for (let i = 0; i < splats; i++) {
      const da = Math.random() * Math.PI * 2;
      const dr = Math.random() * 3 + 1;
      pixelGrain(
        p.dstX + Math.cos(da) * dr,
        p.dstY + Math.sin(da) * dr * TILT,
        1, grainColor(0.85));
    }

    sandX.restore();
  }

  // Trail accumulation: single crisp pixel along Lissajous path
  let trailTimer = 0;
  function stampTrail(t) {
    trailTimer += 1 / 60;
    if (trailTimer < 0.04) return;
    trailTimer = 0;
    const dst = sandDest(t);
    sandX.save();
    clipToDisc();
    pixelGrain(dst.x, dst.y, 1, grainColor(0.65));
    sandX.restore();
  }

  function stepParticle(p, dt) {
    p.vy  += 285 * dt;     // gravity
    p.vx  *= 0.998;        // very slight air drag
    p.x   += p.vx * dt;
    p.y   += p.vy * dt;
    p.life = Math.max(0, p.life - dt * 0.8);   // fade toward landing

    if (p.y >= SEP - 1 && !p.bounced) {
      // Single low bounce for a few grains (adds scatter realism)
      if (Math.random() < 0.25) {
        p.bounced = true;
        p.vy = -p.vy * (0.08 + Math.random() * 0.10);
        p.vx += (Math.random() - 0.5) * 12;
      } else {
        p.done = true;
        stampGrain(p);
      }
    }
    if (p.bounced && p.y >= SEP + 1) {
      p.done = true;
      stampGrain(p);
    }
  }

  // ──────────────────────────────────────────────────────────
  //  DRAW
  // ──────────────────────────────────────────────────────────

  // ① Disc glow — soft golden halo radiating outward from rim
  function drawDiscGlow() {
    const glow = ctx.createRadialGradient(
      BCX, BCY, BR_X * 0.85,
      BCX, BCY, BR_X * 1.55
    );
    glow.addColorStop(0,   'rgba(200,148,40,0.22)');
    glow.addColorStop(0.4, 'rgba(160,100,20,0.10)');
    glow.addColorStop(1,   'rgba(80,40,5,0)');
    ctx.save();
    ctx.scale(1, TILT);
    ctx.beginPath();
    ctx.arc(BCX, BCY / TILT, BR_X * 1.55, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();
    ctx.restore();
  }

  // ② Bob shadow — ellipse projected onto disc surface
  function drawBobShadow(bx, by) {
    // Map bob screen-x to world-x offset on disc
    const wx = bx - BCX;
    // Shadow center: slide toward disc center as bob rises
    const progress = Math.max(0, Math.min(1, (by - PY) / (SEP - PY)));
    const sx = BCX + wx * 0.45 * progress;
    const sy = BCY - BR_Y * 0.18 + wx * TILT * 0.22 * progress;

    ctx.save();
    ctx.beginPath();
    ctx.ellipse(sx, sy, 14 * progress + 4, (14 * progress + 4) * TILT * 0.7,
                0, 0, Math.PI * 2);
    const sg = ctx.createRadialGradient(sx, sy, 0, sx, sy, 16);
    sg.addColorStop(0,   `rgba(0,0,0,${0.35 * progress})`);
    sg.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.fill();
    ctx.restore();
  }

  // ③ Marble reflection — flipped disc mirrored below the real disc
  function drawDiscReflection() {
    // Reflection sits just below the disc front edge
    const refY = BCY + BR_Y + RIM_H + 2;
    const refH = BR_Y * 1.8;   // vertical extent of reflection

    ctx.save();
    // Clip to floor area only
    ctx.beginPath();
    ctx.rect(0, SEP, W, H - SEP);
    ctx.clip();

    // Flip vertically around refY
    ctx.translate(BCX, refY);
    ctx.scale(1, -1);

    // Draw a faded, compressed copy of the disc
    const pg = ctx.createRadialGradient(
      -BR_X * 0.2, -BR_Y * 0.2, BR_X * 0.05,
      BR_X * 0.08,  BR_Y * 0.08, BR_X * 1.1
    );
    pg.addColorStop(0,    'rgba(220,196,130,0.18)');
    pg.addColorStop(0.5,  'rgba(180,148, 90,0.10)');
    pg.addColorStop(1,    'rgba( 80, 50, 20,0)');

    ctx.beginPath();
    ctx.ellipse(0, 0, BR_X * 0.90, BR_Y * 0.90, 0, 0, Math.PI * 2);
    ctx.fillStyle = pg;
    ctx.fill();

    // Rim highlight in reflection
    ctx.beginPath();
    ctx.ellipse(0, 0, BR_X * 0.90, BR_Y * 0.90, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(180,130,50,0.10)';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.restore();

    // Fade-out mask over reflection (top bright → bottom transparent)
    const fade = ctx.createLinearGradient(0, refY, 0, refY + refH);
    fade.addColorStop(0,   'rgba(0,0,0,0)');
    fade.addColorStop(1,   'rgba(0,0,0,0.92)');
    ctx.fillStyle = fade;
    ctx.fillRect(BCX - BR_X * 1.1, refY, BR_X * 2.2, refH);
  }

  function drawDisc3D() {
    const rimGrad = ctx.createLinearGradient(BCX, BCY + BR_Y,
                                             BCX, BCY + BR_Y + RIM_H);
    rimGrad.addColorStop(0, '#4e3010');
    rimGrad.addColorStop(1, '#1c0c06');

    ctx.beginPath();
    ctx.ellipse(BCX, BCY + RIM_H, BR_X, BR_Y, 0, 0, Math.PI);
    ctx.ellipse(BCX, BCY,         BR_X, BR_Y, 0, Math.PI, 0, true);
    ctx.closePath();
    ctx.fillStyle = rimGrad;
    ctx.fill();

    ctx.beginPath();
    ctx.ellipse(BCX, BCY + RIM_H, BR_X, BR_Y, 0, 0.05, Math.PI - 0.05);
    ctx.strokeStyle = '#120806';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur  = 18;
    const pg = ctx.createRadialGradient(
      BCX - BR_X*0.28, BCY - BR_Y*0.34, BR_X*0.04,
      BCX + BR_X*0.08, BCY + BR_Y*0.10, BR_X*1.10
    );
    pg.addColorStop(0,    '#dfc88a');
    pg.addColorStop(0.45, '#c4a864');
    pg.addColorStop(0.80, '#a48444');
    pg.addColorStop(1,    '#562e0e');
    ctx.beginPath();
    ctx.ellipse(BCX, BCY, BR_X, BR_Y, 0, 0, Math.PI * 2);
    ctx.fillStyle = pg;
    ctx.fill();
    ctx.restore();

    ctx.beginPath();
    ctx.ellipse(BCX, BCY, BR_X, BR_Y, 0, 0, Math.PI * 2);
    ctx.strokeStyle = '#381c08';
    ctx.lineWidth = 3.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(BCX, BCY, BR_X - 9, (BR_X - 9) * TILT, 0, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(36,14,4,0.20)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  function drawWire(bx, by, prec) {
    const alpha = 0.46 + 0.54 * Math.abs(Math.cos(prec));
    ctx.beginPath();
    ctx.moveTo(PX, PY + 9);
    ctx.lineTo(bx, by - 9);
    ctx.strokeStyle = `rgba(80,58,16,${alpha.toFixed(2)})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }

  function drawPivot() {
    ctx.save();
    ctx.translate(PX, PY);
    const mg = ctx.createLinearGradient(-15, -9, 15, 5);
    mg.addColorStop(0,   '#6a5030');
    mg.addColorStop(0.5, '#8a6a42');
    mg.addColorStop(1,   '#3a2810');
    ctx.fillStyle = mg;
    ctx.beginPath();
    ctx.rect(-15, -9, 30, 12);
    ctx.fill();
    ctx.strokeStyle = '#1c1008';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    const bg = ctx.createRadialGradient(-2, -1.5, 0.8, 0, 0, 6);
    bg.addColorStop(0,   '#ffe878');
    bg.addColorStop(0.4, '#c89028');
    bg.addColorStop(1,   '#503010');
    ctx.beginPath();
    ctx.arc(0, 3, 6, 0, Math.PI * 2);
    ctx.fillStyle = bg;
    ctx.fill();
    ctx.strokeStyle = '#1c1008';
    ctx.lineWidth = 0.4;
    ctx.stroke();
    ctx.restore();
  }

  function drawBob(bx, by, depth) {
    ctx.save();
    ctx.translate(bx, by);
    const s = 1 - 0.10 * Math.abs(depth);
    ctx.scale(s, s);

    const g = ctx.createRadialGradient(-4, -6, 1.2, 1, 2, 15);
    g.addColorStop(0,    '#faf088');
    g.addColorStop(0.20, '#e4ac20');
    g.addColorStop(0.55, '#b07010');
    g.addColorStop(1,    '#3c1800');

    ctx.beginPath();
    ctx.moveTo(0, -10);
    ctx.bezierCurveTo( 10, -5,  13,  4,  0, 18);
    ctx.bezierCurveTo(-13,  4, -10, -5,  0, -10);
    ctx.closePath();
    ctx.fillStyle = g;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.26)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    ctx.beginPath();
    ctx.ellipse(-4, -1, 2.8, 6, -0.32, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,248,200,0.26)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(0, 16, 1.8, 0, Math.PI * 2);
    ctx.fillStyle = '#180900';
    ctx.fill();
    ctx.restore();
  }

  // ──────────────────────────────────────────────────────────
  //  EMIT SAND
  // ──────────────────────────────────────────────────────────
  function emitSand(bob, t) {
    frameN++;
    if (frameN % 8 !== 0) return;
    const dst = sandDest(t);
    for (let i = 0; i < 1; i++) {
      particles.push(makeParticle(bob.x, bob.y, bob.vx, dst));
    }
    particles = particles.filter(p => !p.done);
  }

  // ──────────────────────────────────────────────────────────
  //  RENDER
  // ──────────────────────────────────────────────────────────
  function render() {
    ctx.clearRect(0, 0, W, H);

    // 1. Static texture (stone wall + marble floor)
    ctx.drawImage(texC, 0, 0);

    // 2. Marble reflection (below disc, on floor)
    drawDiscReflection();

    // 3. Disc glow halo
    drawDiscGlow();

    // 4. 3-D disc body
    drawDisc3D();

    // 5. Sand trail + compass rose
    ctx.drawImage(sandC, 0, 0);

    // 6. Current bob
    const bob = bobPos(simTime);
    emitSand(bob, simTime);
    stampTrail(simTime);   // continuous mound buildup along Lissajous path
    for (const p of particles) {
      if (!p.done) stepParticle(p, 1 / 60);
    }

    // 7. Bob shadow on disc surface
    drawBobShadow(bob.x, bob.y);

    // 8. Wire & pivot
    drawWire(bob.x, bob.y, bob.prec);
    drawPivot();

    // 9. Falling particles (clipped to upper chamber)
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, W, SEP + 4);
    ctx.clip();
    for (const p of particles) {
      if (p.done) continue;
      // Fade opacity with life; also draw tiny motion-blur tail
      const alpha = Math.max(0.1, p.life * 0.92);
      ctx.globalAlpha = alpha;
      // Tail: small streak in direction of travel
      if (Math.abs(p.vy) > 30) {
        const tailLen = Math.min(p.vy * 0.018, 5);
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x - p.vx * 0.012, p.y - tailLen);
        ctx.strokeStyle = p.col;
        ctx.lineWidth = p.r * 0.8;
        ctx.stroke();
      }
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.col;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // 10. Bob (topmost)
    drawBob(bob.x, bob.y, bob.depth);
  }

  // ──────────────────────────────────────────────────────────
  //  PLAYBACK STATE
  // ──────────────────────────────────────────────────────────
  let paused    = false;
  let speedMult = 1.0;

  // ──────────────────────────────────────────────────────────
  //  CITY UI
  // ──────────────────────────────────────────────────────────
  const cityListEl = document.getElementById('cityList');

  function updateStats(city) {
    const rpm   = currentPrecRate * 60 / (2 * Math.PI);
    const realH = 24 / Math.sin(city.lat * Math.PI / 180);
    document.getElementById('statLat').textContent    = `${city.lat}°N`;
    document.getElementById('statRpm').textContent    = `${rpm.toFixed(2)} rpm`;
    document.getElementById('statPeriod').textContent =
      realH > 999 ? '∞' : `${realH.toFixed(1)} h`;
  }

  function selectCity(idx) {
    currentCity     = idx;
    const city      = CITIES[idx];
    currentPrecRate = cityPrecRate(city.lat);
    resetSand();
    particles = [];
    document.querySelectorAll('.city-btn').forEach((btn, i) =>
      btn.classList.toggle('active', i === idx));
    updateStats(city);
  }

  CITIES.forEach((city, i) => {
    const btn = document.createElement('button');
    btn.className = 'city-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML =
      `${city.name}${city.country
        ? ` <small style="color:#4a3010;font-size:7.5px">${city.country}</small>`
        : ''}<span class="lat-badge">${city.lat}°</span>`;
    btn.addEventListener('click', () => selectCity(i));
    cityListEl.appendChild(btn);
  });

  updateStats(CITIES[0]);

  // ── Pause / Play ───────────────────────────────────────────
  const pauseBtn = document.getElementById('pauseBtn');
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? '▶' : '⏸';
    pauseBtn.classList.toggle('paused', paused);
    if (!paused) lastTS = null;
  });

  // ── Speed slider ───────────────────────────────────────────
  const speedSlider = document.getElementById('speedSlider');
  const speedValEl  = document.getElementById('speedVal');
  speedSlider.addEventListener('input', () => {
    speedMult = parseFloat(speedSlider.value);
    const label = speedMult === Math.round(speedMult)
      ? `×${speedMult}`
      : `×${speedMult.toFixed(2)}`;
    speedValEl.textContent = label;
  });

  // ── Reset ──────────────────────────────────────────────────
  document.getElementById('resetBtn').addEventListener('click', () => {
    resetSand();
    particles = [];
  });

  // ──────────────────────────────────────────────────────────
  //  ANIMATION LOOP
  // ──────────────────────────────────────────────────────────
  function loop(ts) {
    if (!paused) {
      if (lastTS === null) lastTS = ts;
      const raw = Math.min((ts - lastTS) / 1000, 0.05);
      const dt  = raw * speedMult;
      simTime  += dt;
      render();
    }
    lastTS = paused ? null : ts;
    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
</script>
</body>
</html>
